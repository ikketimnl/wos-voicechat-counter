services:
  counterbot-vc:
    build:
      context: .
    container_name: counterbot-vc
    restart: unless-stopped

    # network_mode: host is required for Discord voice (UDP) to work correctly
    # on Linux hosts. On Docker Desktop for Windows/macOS this has no effect;
    # run the bot natively there instead of in Docker.
    network_mode: host

    environment:
      - NODE_ENV=production

    volumes:
      # config/ holds config.json, settings.json, and custom_audio/
      # Mount this so all settings + custom audio survive container rebuilds.
      - ./config:/app/config
      # temp/ holds the generated number library and countdown cache.
      # Mounting it avoids regenerating ~200 WAV files on every restart.
      - ./temp:/app/temp
      # app code install within a local volume to persist between restarts, but not persistent data that might be migrated
      # Eventually this should be pulled on bot start and replaced if new (assuming it doesn't need new pre-requisites)
      - counterbot_vc:/app/src

    healthcheck:
      test: ["CMD", "node", "-e", "require('./src/svc/BotSettings')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

volumes:
  counterbot_vc:
