services:
  counterbot-vc:
    # Pre-built image from GitHub Container Registry (updated on every push to main).
    # To build locally from source instead, replace this with:
    #   build:
    #     context: .
    image: ghcr.io/ikketimnl/wos-voicechat-counter:latest
    container_name: counterbot-vc
    restart: unless-stopped

    # network_mode: host is required for Discord voice (UDP) to work correctly
    # on Linux hosts. On Docker Desktop for Windows/macOS this has no effect;
    # run the bot natively there instead of in Docker.
    network_mode: host

    environment:
      - NODE_ENV=production
      # Optional: pass Discord credentials via env vars instead of config/config.json.
      # If set in the host shell / .env file, they are forwarded into the container.
      - DISCORD_TOKEN
      - DISCORD_CLIENT_ID
      - DISCORD_GUILD_ID
      # Optional: override the Piper ONNX model path (useful for custom voice models).
      - PIPER_MODEL

    volumes:
      # config/ holds config.json, settings.json, players.json and custom_audio/.
      # Mount this so all user data survives container rebuilds.
      - ./config:/app/config
      # temp/ holds the generated number library and countdown cache.
      # Mounting it avoids regenerating ~200 WAV files on every restart.
      - ./temp:/app/temp
      # NOTE: /app/src is intentionally NOT mounted as a named volume.
      # Doing so would shadow the code baked into the image and cause
      # `docker compose up -d --build` to silently run stale code from the
      # old volume instead of the freshly-built image. Code updates come
      # from rebuilding the image, not from a volume mount.

    healthcheck:
      test: ["CMD", "node", "-e", "require('./src/svc/BotSettings')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

